name: sync-fork
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: { }
env:
  REPOSITORY: yt-dlp/yt-dlp
  BRANCH_NAME: master
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Step 1: Checkout the forked repository using the personal access token
      - name: Checkout Fork
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ref: master
          fetch-depth: 0

      # Step 2: Set up Git to make changes
      - name: Set Up Git for Sync
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      # Step 3: Add the upstream (parent) repository as a remote
      - name: Add Upstream Remote
        run: git remote add upstream https://github.com/yt-dlp/yt-dlp

      # Step 4: Fetch upstream changes
      - name: Fetch Upstream Changes
        run: git fetch upstream

      # Step 5: Merge upstream changes into fork's master branch
      - name: Merge Upstream into Fork
        run: |
          git rebase upstream/master
          git push --force https://$TOKEN@github.com/Hebo/yt-dlp refs/heads/master
        env:
          TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
